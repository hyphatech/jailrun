- name: Export a jail to a host-shared directory
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    export_fmt: "xz"

  tasks:
    - name: Ensure export directory exists
      ansible.builtin.file:
        path: "{{ snapshot_dir }}"
        state: directory
        mode: "0755"

    - name: Get jail states
      ansible.builtin.command: bastille list -j
      register: bastille_jails
      changed_when: false

    - name: Check if jail is running
      ansible.builtin.set_fact:
        jail_is_running: >-
          {{ bastille_jails.stdout | from_json
             | selectattr('Name', 'equalto', jail_name)
             | selectattr('State', 'equalto', 'Up')
             | list | length > 0 }}

    - name: Export jail archive
      ansible.builtin.command: >
        bastille export {{ '--live' if jail_is_running else '' }}
        --{{ export_fmt }} {{ jail_name }} {{ snapshot_dir }}
      register: export_result
      changed_when: true
      failed_when: export_result.rc != 0

    - name: Export result
      ansible.builtin.debug:
        var: export_result.stdout_lines
