- name: Yggdrasil
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    jrun_bridge_ip: 10.17.89.1
    ygg_conf_file: /usr/local/etc/yggdrasil.conf
    ygg_key_file: /usr/local/etc/yggdrasil.key
    ygg_listen_uri: tcp://10.17.89.1:19001

  tasks:
    - name: Validate required relay variables
      ansible.builtin.assert:
        that:
          - relay_peer_uri is defined and relay_peer_uri | length > 0
          - relay_pubkey is defined and relay_pubkey | length > 0
        fail_msg: "relay_peer_uri and relay_pubkey must be set"

    - name: Install Yggdrasil
      ansible.builtin.package:
        name:
          - yggdrasil
        state: present

    - name: Check whether Yggdrasil config already exists
      ansible.builtin.stat:
        path: "{{ ygg_conf_file }}"
      register: ygg_conf_stat

    - name: Generate initial Yggdrasil config if missing
      ansible.builtin.command: yggdrasil -genconf
      register: ygg_genconf
      changed_when: true
      when: not ygg_conf_stat.stat.exists

    - name: Write initial Yggdrasil config if missing
      ansible.builtin.copy:
        dest: "{{ ygg_conf_file }}"
        content: "{{ ygg_genconf.stdout }}"
        owner: root
        group: wheel
        mode: "0644"
      when: not ygg_conf_stat.stat.exists

    - name: Check whether Yggdrasil private key exists
      ansible.builtin.stat:
        path: "{{ ygg_key_file }}"
      register: ygg_key_stat

    - name: Export Yggdrasil private key if missing
      ansible.builtin.command: yggdrasil -useconffile {{ ygg_conf_file }} -exportkey
      register: ygg_exportkey
      changed_when: true
      when: not ygg_key_stat.stat.exists

    - name: Write Yggdrasil private key if missing
      ansible.builtin.copy:
        dest: "{{ ygg_key_file }}"
        content: "{{ ygg_exportkey.stdout }}"
        owner: root
        group: wheel
        mode: "0600"
      when: not ygg_key_stat.stat.exists

    - name: Install managed Yggdrasil host config
      ansible.builtin.template:
        src: yggdrasil-host.conf.j2
        dest: "{{ ygg_conf_file }}"
        owner: root
        group: wheel
        mode: "0644"
      notify: restart yggdrasil

    - name: Enable Yggdrasil at boot
      ansible.builtin.command: sysrc yggdrasil_enable="YES"
      changed_when: false

    - name: Ensure Yggdrasil is running
      ansible.builtin.service:
        name: yggdrasil
        state: started

    - name: Verify Yggdrasil listener is present
      ansible.builtin.command: sockstat -l
      register: ygg_sockstat
      changed_when: false
      failed_when: "'10.17.89.1:19001' not in (ygg_sockstat.stdout | default(''))"

    - name: Configure ntpd to step on any offset
      ansible.builtin.lineinfile:
        path: /etc/ntp.conf
        line: "tinker panic 0"
        regexp: '^tinker'
        insertbefore: BOF

    - name: Enable ntpd
      ansible.builtin.command: sysrc ntpd_enable="YES"
      changed_when: false

    - name: Start ntpd
      ansible.builtin.service:
        name: ntpd
        state: started

    - name: Bootstrap release (might take some time ☕️)
      ansible.builtin.command: bastille bootstrap {{ bsd_version }}-{{ bsd_release_tag }}

  handlers:
    - name: stop yggdrasil
      ansible.builtin.command: service yggdrasil stop
      register: ygg_stop
      failed_when: false
      changed_when: true
      listen: restart yggdrasil

    - name: start yggdrasil
      ansible.builtin.command: service yggdrasil start
      register: ygg_start
      failed_when: ygg_start.rc != 0
      listen: restart yggdrasil
