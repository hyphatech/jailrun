- name: Delete snapshot
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  tasks:
    - name: Resolve ZFS dataset for jail
      ansible.builtin.command: >-
        zfs list -H -o name {{ jrun_jails_dir }}/{{ snapshot_jail }}
      register: zfs_dataset
      changed_when: false
      failed_when: zfs_dataset.rc != 0

    - name: Destroy snapshot
      ansible.builtin.command: >-
        zfs destroy -r {{ zfs_dataset.stdout | trim }}@{{ snapshot_name }}
