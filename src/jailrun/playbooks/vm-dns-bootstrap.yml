- name: Bootstrap local_unbound for jail DNS
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    unbound_dir: /var/unbound
    unbound_conf: /var/unbound/unbound.conf
    jrun_include: /var/unbound/conf.d/jrun.conf
    jrun_domain: jrun
    jrun_dns_ip: "10.17.89.1"
    jrun_acl: "10.17.89.0/24"
    jrun_iface: bridge0
    upstream_dns: "10.0.2.3"

  tasks:
    - name: Verify DNS bridge interface exists
      ansible.builtin.command: ifconfig {{ jrun_iface }}
      register: jrun_iface_check
      changed_when: false
      failed_when: >
        jrun_iface_check.rc != 0 or
        jrun_dns_ip not in (jrun_iface_check.stdout | default(''))

    - name: Enable local_unbound at boot
      ansible.builtin.lineinfile:
        path: /etc/rc.conf
        regexp: '^local_unbound_enable='
        line: 'local_unbound_enable="YES"'
        state: present

    - name: Ensure local_unbound config directory exists
      ansible.builtin.file:
        path: "{{ unbound_dir }}/conf.d"
        state: directory
        owner: unbound
        group: unbound
        mode: "0755"

    - name: Write local_unbound main config
      ansible.builtin.copy:
        dest: "{{ unbound_conf }}"
        owner: unbound
        group: unbound
        mode: "0644"
        backup: true
        content: |
          server:
              username: unbound
              directory: {{ unbound_dir }}
              chroot: ""
              pidfile: /var/run/local_unbound.pid

          remote-control:
              control-enable: yes
              control-interface: /var/run/local_unbound.ctl

          include: "{{ jrun_include }}"
      register: conf_written

    - name: Write bootstrap DNS forwarding config
      ansible.builtin.copy:
        dest: "{{ jrun_include }}"
        owner: unbound
        group: unbound
        mode: "0644"
        force: false
        content: |
          server:
              interface: 127.0.0.1
              interface: {{ jrun_dns_ip }}
              access-control: 127.0.0.0/8 allow
              access-control: {{ jrun_acl }} allow

          forward-zone:
              name: "."
              forward-addr: {{ upstream_dns }}
      register: bootstrap_written

    - name: Validate local_unbound config
      ansible.builtin.command: local-unbound-checkconf
      changed_when: false
      when: conf_written.changed or bootstrap_written.changed

    - name: Check local_unbound status
      ansible.builtin.command: service local_unbound status
      register: unbound_status
      failed_when: false
      changed_when: false

    - name: Start local_unbound if stopped
      ansible.builtin.command: service local_unbound start
      when: unbound_status.rc != 0

    - name: Restart local_unbound if config changed
      ansible.builtin.command: service local_unbound restart
      when:
        - unbound_status.rc == 0
        - conf_written.changed or bootstrap_written.changed

    - name: Point VM resolver to local_unbound
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        mode: "0644"
        content: |
          search local.{{ jrun_domain }}
          nameserver 127.0.0.1
