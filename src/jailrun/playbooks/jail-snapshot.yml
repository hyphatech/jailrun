- name: Create snapshot
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  tasks:
    - name: Resolve dataset
      ansible.builtin.command: >-
        zfs list -H -o name {{ jrun_jails_dir }}/{{ snapshot_jail }}
      register: zfs_dataset
      changed_when: false
      failed_when: zfs_dataset.rc != 0

    - name: Create snapshot
      ansible.builtin.command: >-
        zfs snapshot -r {{ zfs_dataset.stdout | trim }}@{{ snapshot_name }}
      register: snap_result
      failed_when: >
        snap_result.rc != 0 and 'dataset already exists' not in (snap_result.stderr | default(''))
      changed_when: snap_result.rc == 0
