- name: Configure Yggdrasil in jails
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    bastille_jails_root: /usr/local/bastille/jails
    ygg_conf_file: /usr/local/etc/yggdrasil.conf
    ygg_key_file: /usr/local/etc/yggdrasil.key

    ygg_host_ip: "10.17.89.1"
    ygg_host_port: 19001
    ygg_host_peer_uri: "tcp://{{ ygg_host_ip }}:{{ ygg_host_port }}"

  tasks:
    - name: Check whether yggdrasil is already installed
      ansible.builtin.command: "bastille cmd {{ item.private_name }} pkg info -e yggdrasil"
      loop: "{{ jails | default([]) }}"
      register: ygg_pkg_present
      changed_when: false
      failed_when: false

    - name: Install yggdrasil in jails
      ansible.builtin.command: "bastille pkg {{ item.item.private_name }} install -y yggdrasil"
      loop: "{{ ygg_pkg_present.results | default([]) }}"
      when: item.rc != 0

    - name: Check whether jail Yggdrasil private key exists
      ansible.builtin.stat:
        path: "{{ bastille_jails_root }}/{{ item.private_name }}/root{{ ygg_key_file }}"
      loop: "{{ jails | default([]) }}"
      register: ygg_key_stat

    - name: Generate jail Yggdrasil config if key missing
      ansible.builtin.command: "bastille cmd {{ item.item.private_name }} yggdrasil -genconf"
      loop: "{{ ygg_key_stat.results | default([]) }}"
      when: not item.stat.exists
      register: ygg_genconf
      changed_when: true

    - name: Write temporary generated Yggdrasil config
      ansible.builtin.copy:
        dest: "{{ bastille_jails_root }}/{{ item.item.item.private_name }}/root{{ ygg_conf_file }}"
        content: "{{ item.stdout }}"
        mode: "0644"
      loop: "{{ ygg_genconf.results | default([]) }}"
      when: item.changed | default(false)

    - name: Export jail Yggdrasil private key
      ansible.builtin.command: "bastille cmd {{ item.item.private_name }} yggdrasil -useconffile {{ ygg_conf_file }} -exportkey"
      loop: "{{ ygg_key_stat.results | default([]) }}"
      when: not item.stat.exists
      register: ygg_exportkey
      changed_when: true

    - name: Persist jail Yggdrasil private key
      ansible.builtin.copy:
        dest: "{{ bastille_jails_root }}/{{ item.item.item.private_name }}/root{{ ygg_key_file }}"
        content: "{{ item.stdout }}"
        mode: "0600"
      loop: "{{ ygg_exportkey.results | default([]) }}"
      when: item.changed | default(false)

    - name: Install managed Yggdrasil config in jail
      ansible.builtin.template:
        src: yggdrasil-jail.conf.j2
        dest: "{{ bastille_jails_root }}/{{ item.private_name }}/root{{ ygg_conf_file }}"
        mode: "0644"
      loop: "{{ jails | default([]) }}"

    - name: Enable Yggdrasil in jails
      ansible.builtin.command: "bastille sysrc {{ item.private_name }} yggdrasil_enable=YES"
      loop: "{{ jails | default([]) }}"
      changed_when: false

    - name: Check Yggdrasil status in jails
      ansible.builtin.command: "bastille cmd {{ item.private_name }} service yggdrasil status"
      loop: "{{ jails | default([]) }}"
      register: ygg_status
      failed_when: false
      changed_when: false

    - name: Start Yggdrasil in jails where not running
      ansible.builtin.command: "bastille cmd {{ item.item.private_name }} service yggdrasil start"
      loop: "{{ ygg_status.results }}"
      when: item.rc != 0

    - name: Restart Yggdrasil in jails where already running
      ansible.builtin.command: "bastille cmd {{ item.item.private_name }} service yggdrasil restart"
      loop: "{{ ygg_status.results }}"
      when: item.rc == 0

    - name: Verify jail can reach host Yggdrasil listener
      ansible.builtin.command: "bastille cmd {{ item.private_name }} nc -z {{ ygg_host_ip }} {{ ygg_host_port }}"
      loop: "{{ jails | default([]) }}"
      changed_when: false
