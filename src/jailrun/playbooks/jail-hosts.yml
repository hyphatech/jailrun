- name: Sync jail discovery hosts
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    bastille_jails_root: /usr/local/bastille/jails

  tasks:
    - name: Build hosts entries for all jails
      ansible.builtin.set_fact:
        jail_hosts: |
          {% for j in jails %}
          {{ j.ip }}  {{ j.name }}
          {% endfor %}

    - name: Write jail discovery entries to /etc/hosts
      ansible.builtin.blockinfile:
        path: "{{ bastille_jails_root }}/{{ item.name }}/root/etc/hosts"
        marker: "# {mark} JRUN DISCOVERY"
        block: "{{ jail_hosts }}"
      loop: "{{ jails | default([]) }}"
