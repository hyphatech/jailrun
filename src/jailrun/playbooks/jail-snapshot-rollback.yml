- name: Rollback to snapshot
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  tasks:
    - name: Resolve ZFS dataset for jail
      ansible.builtin.command: >-
        zfs list -H -o name {{ jrun_jails_dir }}/{{ snapshot_jail }}
      register: zfs_dataset
      changed_when: false
      failed_when: zfs_dataset.rc != 0

    - name: Stop jail before rollback
      ansible.builtin.command: >-
        jail -r -f {{ jrun_jails_dir }}/{{ snapshot_jail }}/jail.conf {{ snapshot_jail }}
      failed_when: >
        result.rc != 0 and
        'not running' not in (result.stderr | default('')) and
        'not found' not in (result.stderr | default(''))
      register: result
      changed_when: false

    - name: Rollback root filesystem
      ansible.builtin.command: >-
        zfs rollback -r {{ zfs_dataset.stdout | trim }}/root@{{ snapshot_name }}

    - name: Rollback jail config
      ansible.builtin.command: >-
        zfs rollback -r {{ zfs_dataset.stdout | trim }}@{{ snapshot_name }}

    - name: Start jail after rollback
      ansible.builtin.command: >-
        jail -c -f {{ jrun_jails_dir }}/{{ snapshot_jail }}/jail.conf
      changed_when: true
