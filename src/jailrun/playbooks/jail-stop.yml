- name: Stop jails
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  tasks:
    - name: Build list of jails with jrun executables
      ansible.builtin.set_fact:
        exec_jail_private_names: "{{ execs | default([]) | map(attribute='jail_private_name') | unique | list }}"

    - name: Stop monit services in jails that have jrun executables
      ansible.builtin.command: "bastille cmd {{ item }} monit -g jrun stop all"
      loop: "{{ exec_jail_private_names | default([]) }}"
      failed_when: false
      changed_when: false

    - name: Stop monit in jails
      ansible.builtin.command: "bastille cmd {{ item.private_name }} service monit stop"
      loop: "{{ jails | default([]) }}"
      failed_when: false
      changed_when: false

    - name: Stop jails
      ansible.builtin.command: "bastille stop {{ item.private_name }}"
      loop: "{{ jails | default([]) }}"
      register: result
      failed_when: >
        result.rc != 0 and
        'not running' not in (result.stderr | default('')) and
        'not found' not in (result.stderr | default(''))
      changed_when: result.rc == 0
