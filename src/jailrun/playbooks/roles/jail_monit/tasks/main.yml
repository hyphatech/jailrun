- name: Ensure monit.d dir exists
  ansible.builtin.file:
    path: "{{ jrun_jails_dir }}/{{ item.private_name }}/root/usr/local/etc/monit.d"
    state: directory
    mode: "0700"
  loop: "{{ jails | default([]) }}"

- name: Ensure service directory exists
  ansible.builtin.file:
    path: "{{ jrun_jails_dir }}/{{ item.jail_private_name }}/root{{ item.dir }}"
    state: directory
    mode: "0755"
  loop: "{{ execs | default([]) }}"

- name: Remove stale monitrc files
  ansible.builtin.shell: |
    find {{ jrun_jails_dir }}/{{ item.private_name }}/root/usr/local/etc/monit.d -name '*.monitrc' -delete
  loop: "{{ jails | default([]) }}"
  changed_when: true

- name: Write base monitrc
  ansible.builtin.template:
    src: monitrc.j2
    dest: "{{ jrun_jails_dir }}/{{ item.private_name }}/root/usr/local/etc/monitrc"
    mode: "0600"
  loop: "{{ jails | default([]) }}"

- name: Write exec monitrc files
  ansible.builtin.template:
    src: exec.monitrc.j2
    dest: "{{ jrun_jails_dir }}/{{ item.jail_private_name }}/root/usr/local/etc/monit.d/{{ item.jail }}-{{ item.name }}.monitrc"
    mode: "0600"
  loop: "{{ execs | default([]) }}"
  register: exec_monitrc

- name: Enable monit
  ansible.builtin.command: "jexec {{ item.private_name }} sysrc monit_enable=YES"
  loop: "{{ jails | default([]) }}"
  changed_when: false

- name: Validate monit config
  ansible.builtin.command: "jexec {{ item.private_name }} monit -t"
  loop: "{{ jails | default([]) }}"

- name: Check monit status
  ansible.builtin.command: "jexec {{ item.private_name }} service monit onestatus"
  loop: "{{ jails | default([]) }}"
  register: monit_status
  failed_when: false
  changed_when: false

- name: Start monit if not running
  ansible.builtin.command: "jexec {{ item.item.private_name }} service monit onestart"
  loop: "{{ monit_status.results }}"
  when: item.rc != 0

- name: Reload monit if running
  ansible.builtin.command: "jexec {{ item.item.private_name }} monit reload"
  loop: "{{ monit_status.results }}"
  when: item.rc == 0

- name: Restart executables whose monit config changed
  ansible.builtin.command: >-
    jexec {{ item.item.jail_private_name }}
    monit restart {{ item.item.jail }}-{{ item.item.name }}
  loop: "{{ exec_monitrc.results | default([]) }}"
  when: item.changed
  failed_when: false

- name: Re-enable monitoring for all jrun services
  ansible.builtin.command: "jexec {{ item.private_name }} monit -g jrun monitor all"
  loop: "{{ jails | default([]) }}"
  failed_when: false

- name: Start all jrun-managed services via monit
  ansible.builtin.command: "jexec {{ item.private_name }} monit -g jrun start all"
  loop: "{{ jails | default([]) }}"
  failed_when: false
