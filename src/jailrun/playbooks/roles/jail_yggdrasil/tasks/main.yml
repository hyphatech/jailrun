- name: Install Yggdrasil
  ansible.builtin.command: "jexec {{ item.private_name }} pkg install -y yggdrasil"
  loop: "{{ jails | default([]) }}"
  register: ygg_install
  changed_when: "'Installing' in (ygg_install.stdout | default(''))"
  failed_when: ygg_install.rc != 0

- name: Generate Yggdrasil key if missing
  ansible.builtin.shell: |
    jexec {{ item.private_name }} yggdrasil -genconf > {{ jrun_jails_dir }}/{{ item.private_name }}/root{{ ygg_conf_file }}
    jexec {{ item.private_name }} yggdrasil -useconffile {{ ygg_conf_file }} -exportkey > {{ jrun_jails_dir }}/{{ item.private_name }}/root{{ ygg_key_file }}
    chmod 600 {{ jrun_jails_dir }}/{{ item.private_name }}/root{{ ygg_key_file }}
  args:
    creates: "{{ jrun_jails_dir }}/{{ item.private_name }}/root{{ ygg_key_file }}"
  loop: "{{ jails | default([]) }}"

- name: Install managed Yggdrasil config
  ansible.builtin.template:
    src: yggdrasil-jail.conf.j2
    dest: "{{ jrun_jails_dir }}/{{ item.private_name }}/root{{ ygg_conf_file }}"
    mode: "0644"
  loop: "{{ jails | default([]) }}"
  register: ygg_config

- name: Enable Yggdrasil
  ansible.builtin.command: "jexec {{ item.private_name }} sysrc yggdrasil_enable=YES"
  loop: "{{ jails | default([]) }}"
  changed_when: false

- name: Stop Yggdrasil if config changed
  ansible.builtin.command: "jexec {{ item.item.private_name }} service yggdrasil stop"
  loop: "{{ ygg_config.results | default([]) }}"
  when: item.changed
  failed_when: false

- name: Start Yggdrasil
  ansible.builtin.command: "jexec {{ item.private_name }} service yggdrasil start"
  loop: "{{ jails | default([]) }}"
  register: ygg_start
  failed_when: false
  changed_when: "'Starting' in (ygg_start.stdout | default(''))"

- name: Verify jail can reach host Yggdrasil listener
  ansible.builtin.command: "jexec {{ item.private_name }} nc -z {{ jrun_bridge_ip }} {{ ygg_host_port }}"
  loop: "{{ jails | default([]) }}"
  changed_when: false
