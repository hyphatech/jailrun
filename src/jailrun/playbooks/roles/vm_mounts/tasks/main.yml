- name: Ensure virtio_p9fs loads at boot
  ansible.builtin.lineinfile:
    path: /boot/loader.conf
    create: true
    line: 'virtio_p9fs_load="YES"'

- name: Load virtio_p9fs module
  ansible.builtin.command: kldload virtio_p9fs
  register: kldload_result
  failed_when: false
  changed_when: kldload_result.rc == 0

- name: Ensure base mount dir exists
  ansible.builtin.file:
    path: "{{ jrun_mount_root }}"
    state: directory
    mode: "0755"

- name: Unmount stale p9fs shares
  ansible.builtin.command: "/sbin/umount {{ jrun_mount_root }}/{{ item.mount_tag }}"
  loop: "{{ stale_mounts | default([]) }}"
  register: umount_stale
  failed_when: false
  changed_when: umount_stale.rc == 0

- name: Verify stale p9fs shares are unmounted
  ansible.builtin.shell: "mount | grep -q ' {{ jrun_mount_root }}/{{ item.mount_tag }} '"
  loop: "{{ stale_mounts | default([]) }}"
  register: verify_unmount
  failed_when: false
  changed_when: false

- name: Safety stop if stale p9fs mount is still active
  ansible.builtin.fail:
    msg: >
      Cannot unmount {{ jrun_mount_root }}/{{ item.item.mount_tag }}.
      Something may still be using it.
      Check: fstat {{ jrun_mount_root }}/{{ item.item.mount_tag }}
  loop: "{{ verify_unmount.results | default([]) }}"
  when: item.rc is defined and item.rc == 0

- name: Remove stale symlinks
  ansible.builtin.file:
    path: "{{ item.target | regex_replace('/+$', '') }}"
    state: absent
  loop: "{{ stale_mounts | default([]) }}"
  when: (item.target | regex_replace('/+$', '')) != (jrun_mount_root ~ '/' ~ item.mount_tag)

- name: Remove stale mountpoint dirs
  ansible.builtin.file:
    path: "{{ jrun_mount_root }}/{{ item.mount_tag }}"
    state: absent
  loop: "{{ stale_mounts | default([]) }}"

- name: Add fstab entries for desired mounts
  ansible.builtin.blockinfile:
    path: "{{ fstab_path }}"
    create: true
    marker: "# {mark} JRUN P9FS"
    block: |
      {% for m in mounts | default([]) %}
      {{ m.mount_tag }}  {{ jrun_mount_root }}/{{ m.mount_tag }}  p9fs  rw,late,failok  0  0
      {% endfor %}
  when: (mounts | default([])) | length > 0

- name: Ensure per-share mountpoints exist
  ansible.builtin.file:
    path: "{{ jrun_mount_root }}/{{ item.mount_tag }}"
    state: directory
    mode: "0755"
  loop: "{{ mounts | default([]) }}"

- name: Check which desired mounts are already active
  ansible.builtin.shell: "mount | grep -q ' {{ jrun_mount_root }}/{{ item.mount_tag }} '"
  loop: "{{ mounts | default([]) }}"
  register: already_mounted
  failed_when: false
  changed_when: false

- name: Mount p9fs shares
  ansible.builtin.command: "/sbin/mount -t p9fs {{ item.item.mount_tag }} {{ jrun_mount_root }}/{{ item.item.mount_tag }}"
  loop: "{{ already_mounted.results }}"
  when: item.rc != 0
  register: p9fs_mount
  failed_when: p9fs_mount.rc != 0
  changed_when: p9fs_mount.rc == 0

- name: Ensure symlink parent dirs exist
  ansible.builtin.file:
    path: "{{ (item.target | regex_replace('/+$', '')) | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ mounts | default([]) }}"
  when: (item.target | regex_replace('/+$', '')) != (jrun_mount_root ~ '/' ~ item.mount_tag)

- name: Create mountpoint symlinks
  ansible.builtin.file:
    src: "{{ jrun_mount_root }}/{{ item.mount_tag }}"
    dest: "{{ item.target | regex_replace('/+$', '') }}"
    state: link
    force: true
  loop: "{{ mounts | default([]) }}"
  when: (item.target | regex_replace('/+$', '')) != (jrun_mount_root ~ '/' ~ item.mount_tag)
