- name: Update pf mesh peers in all jails
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    bastille_jails_root: /usr/local/bastille/jails
    jail_pf_conf: /etc/pf.conf

  tasks:
    - name: List running jails
      ansible.builtin.command: bastille list -j
      register: jail_list_raw
      changed_when: false
      failed_when: false

    - name: Parse running jail names
      ansible.builtin.set_fact:
        running_jails: >-
          {{ (jail_list_raw.stdout | from_json)
             | selectattr('State', 'equalto', 'Up')
             | map(attribute='Name') | list }}
      when:
        - jail_list_raw.rc == 0
        - jail_list_raw.stdout | trim | length > 0

    - name: Default to empty list if no jails running
      ansible.builtin.set_fact:
        running_jails: []
      when: running_jails is not defined

    - name: Write pf.conf in jails
      ansible.builtin.template:
        src: pf-jail.conf.j2
        dest: "{{ bastille_jails_root }}/{{ item }}/root{{ jail_pf_conf }}"
        owner: root
        group: wheel
        mode: "0644"
      loop: "{{ running_jails }}"
      register: pf_written

    - name: Reload pf in jails where config changed
      ansible.builtin.command: "bastille cmd {{ item.item }} pfctl -f {{ jail_pf_conf }}"
      loop: "{{ pf_written.results | default([]) }}"
      when: item.changed | default(false)
