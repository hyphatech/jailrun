- name: Create and prepare jails
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    bastille_jails_root: /usr/local/bastille/jails
    jrun_domain: jrun
    jrun_nameserver: "10.17.89.1"
    jrun_gateway: "10.17.89.1"
    jrun_bridge_name: bridge0
    jrun_cidr_suffix: "/24"

  tasks:
    - name: List existing jails
      ansible.builtin.command: bastille list -j
      register: jail_list_raw
      changed_when: false
      failed_when: false

    - name: Parse existing jail names
      ansible.builtin.set_fact:
        existing_private_names: >-
          {{ (jail_list_raw.stdout | from_json)
            | map(attribute='Name') | list }}
      when:
        - jail_list_raw.rc == 0
        - jail_list_raw.stdout | trim | length > 0

    - name: Default to empty list if no jails
      ansible.builtin.set_fact:
        existing_private_names: []
      when: existing_private_names is not defined

    - name: Create missing jails as bridged VNET jails
      ansible.builtin.command: >-
        bastille create -B {{ item.private_name }} {{ item.release }}
        {{ item.ip }}{{ jrun_cidr_suffix }} {{ jrun_bridge_name }}
      loop: "{{ jails | default([]) }}"
      when:
        - item.private_name not in existing_private_names
        - item.base is not defined or item.base is none
      register: create_result
      failed_when: >
        create_result.rc != 0 and
        'already exists' not in (create_result.stderr | default(''))
      changed_when: create_result.rc == 0

    - name: Stop newly created jails
      ansible.builtin.command: "bastille stop {{ item.item.private_name }}"
      loop: "{{ create_result.results | default([]) }}"
      when:
        - item is not skipped
        - item.changed | default(false)
      failed_when: false
      changed_when: false

    - name: Clone jails from base
      ansible.builtin.command: >-
        bastille clone -a {{ item.base.private_name }} {{ item.private_name }}
        {{ item.ip }}{{ jrun_cidr_suffix }}
      loop: "{{ jails | default([]) }}"
      when:
        - item.private_name not in existing_private_names
        - item.base is defined and item.base is not none
        - item.base.type == "jail"
      register: clone_result
      failed_when: >
        clone_result.rc != 0 and
        'already exists' not in (clone_result.stderr | default(''))
      changed_when: clone_result.rc == 0

    - name: Stop newly cloned jails
      ansible.builtin.command: "bastille stop {{ item.item.private_name }}"
      loop: "{{ clone_result.results | default([]) }}"
      when:
        - item is not skipped
        - item.changed | default(false)
      failed_when: false
      changed_when: false

    - name: Remove Yggdrasil identity from cloned jails
      ansible.builtin.file:
        path: "{{ bastille_jails_root }}/{{ item.item.private_name }}/root/usr/local/etc/yggdrasil.key"
        state: absent
      loop: "{{ clone_result.results | default([]) }}"
      when:
        - item is not skipped
        - item.changed | default(false)

    - name: Remove SSH keys from cloned jails
      ansible.builtin.shell: >-
        rm -f {{ bastille_jails_root }}/{{ item.item.private_name }}/root/etc/ssh/ssh_host_*
      loop: "{{ clone_result.results | default([]) }}"
      when:
        - item is not skipped
        - item.changed | default(false)

    - name: Check sysvipc for all jails
      ansible.builtin.command: "bastille config {{ item.private_name }} get allow.sysvipc"
      loop: "{{ jails | default([]) }}"
      register: sysvipc_check
      changed_when: false
      failed_when: false

    - name: Build list of jails needing sysvipc
      ansible.builtin.set_fact:
        sysvipc_needed: >-
          {{ sysvipc_check.results | default([])
             | selectattr('stdout', 'defined')
             | rejectattr('stdout', 'match', '^\s*1\s*$')
             | map(attribute='item.private_name') | list }}

    - name: Enable sysvipc where needed
      ansible.builtin.command: "bastille config {{ item }} set allow.sysvipc 1"
      loop: "{{ sysvipc_needed | default([]) }}"

    - name: Configure default router in jail rc.conf
      ansible.builtin.lineinfile:
        path: "{{ bastille_jails_root }}/{{ item.private_name }}/root/etc/rc.conf"
        regexp: '^defaultrouter='
        line: 'defaultrouter="{{ jrun_gateway }}"'
        mode: "0644"
      loop: "{{ jails | default([]) }}"

    - name: Configure jail DNS resolver
      ansible.builtin.copy:
        dest: "{{ bastille_jails_root }}/{{ item.private_name }}/root/etc/resolv.conf"
        mode: "0644"
        content: |
          search local.{{ jrun_domain }}
          nameserver {{ jrun_nameserver }}
      loop: "{{ jails | default([]) }}"

    - name: Ensure pkg repo directory exists in jails
      ansible.builtin.file:
        path: "{{ bastille_jails_root }}/{{ item.private_name }}/root/usr/local/etc/pkg/repos"
        state: directory
        mode: "0755"
      loop: "{{ jails | default([]) }}"

    - name: Disable SRV mirror discovery in jails
      ansible.builtin.template:
        src: repos.conf.j2
        dest: "{{ bastille_jails_root }}/{{ item.private_name }}/root/usr/local/etc/pkg/repos/FreeBSD.conf"
        mode: "0644"
      loop: "{{ jails | default([]) }}"
