- name: Tear down stale jails
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  tasks:
    - name: Unmount stale nullfs mounts
      ansible.builtin.command: "bastille umount {{ item.jail }} {{ item.target_path }}"
      loop: "{{ stale_jail_mounts | default([]) }}"
      register: stale_umount
      failed_when: false
      changed_when: stale_umount.rc == 0

    - name: Verify stale nullfs mounts are unmounted
      ansible.builtin.shell: "mount | grep ' {{ item.target_path }} ' | grep -q nullfs"
      loop: "{{ stale_jail_mounts | default([]) }}"
      register: verify_stale_umount
      failed_when: false
      changed_when: false

    - name: Safety stop if stale nullfs mount is still active
      ansible.builtin.fail:
        msg: >
          Cannot unmount nullfs {{ item.item.target_path }} in jail {{ item.item.jail }}.
          Refusing to continue to prevent data loss.
      loop: "{{ verify_stale_umount.results | default([]) }}"
      when: item.rc is defined and item.rc == 0

    - name: Stop stale jails
      ansible.builtin.command: "bastille stop {{ item }}"
      loop: "{{ stale_jails | default([]) }}"
      failed_when: false
      changed_when: false

    - name: Destroy stale jails
      ansible.builtin.command: "bastille destroy -f -y {{ item }}"
      loop: "{{ stale_jails | default([]) }}"
      register: destroy_result
      failed_when: destroy_result.rc != 0 and 'not found' not in (destroy_result.stderr | default(''))
      changed_when: destroy_result.rc == 0
