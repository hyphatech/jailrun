- name: Base VM Setup
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    jrun_bridge_name: bridge0
    jrun_bridge_ip: 10.17.89.1
    jrun_bridge_cidr: 10.17.89.1/24
    jrun_jail_subnet: 10.17.89.0/24
    jrun_ext_if: vtnet0

    ygg_conf_file: /usr/local/etc/yggdrasil.conf
    ygg_key_file: /usr/local/etc/yggdrasil.key
    ygg_listen_uri: tcp://10.17.89.1:19001

  tasks:
    - name: Refresh pkg repository
      ansible.builtin.command: pkg update -f
      register: pkg_update
      changed_when: false
      retries: 3
      delay: 10
      until: pkg_update.rc == 0

    - name: Install base packages
      ansible.builtin.package:
        name:
          - bastille
          - btop
          - fping
          - yggdrasil
        state: present

    - name: Set VM-optimized kernel tunables
      ansible.builtin.lineinfile:
        path: /boot/loader.conf
        line: "{{ item.line }}"
        regexp: "{{ item.regexp }}"
      loop:
        - { regexp: '^kern\.hz=', line: 'kern.hz=100' }
        - { regexp: '^virtio_load=', line: 'virtio_load="YES"' }

    - name: Limit ZFS ARC
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        line: "vfs.zfs.arc_max=2147483648"
        regexp: '^vfs\.zfs\.arc_max='

    - name: Load PF module
      ansible.builtin.command: kldload pf
      register: kldload_pf
      failed_when: >
        kldload_pf.rc != 0 and
        'already loaded' not in (kldload_pf.stderr | default(''))
      changed_when: kldload_pf.rc == 0

    - name: Setup Bastille
      ansible.builtin.command: bastille setup
      changed_when: false
      failed_when: false

    - name: Ensure bridge0 is configured as a cloned interface at boot
      ansible.builtin.command: sysrc cloned_interfaces+=" {{ jrun_bridge_name }}"
      changed_when: false

    - name: Check whether bridge exists
      ansible.builtin.command: ifconfig {{ jrun_bridge_name }}
      register: jrun_bridge_check
      failed_when: false
      changed_when: false

    - name: Create bridge if missing
      ansible.builtin.command: ifconfig {{ jrun_bridge_name }} create
      when: jrun_bridge_check.rc != 0
      changed_when: true

    - name: Configure bridge address at boot
      ansible.builtin.command: sysrc ifconfig_{{ jrun_bridge_name }}="inet {{ jrun_bridge_cidr }}"
      changed_when: false

    - name: Assign bridge address now
      ansible.builtin.command: ifconfig {{ jrun_bridge_name }} inet {{ jrun_bridge_cidr }}
      changed_when: false
      failed_when: false

    - name: Enable IPv4 routing at boot
      ansible.builtin.command: sysrc gateway_enable="YES"
      changed_when: false

    - name: Enable IPv4 routing now
      ansible.builtin.command: sysctl net.inet.ip.forwarding=1
      changed_when: false

    - name: Ensure PF anchor directory exists
      ansible.builtin.file:
        path: /etc/pf.anchors
        state: directory
        owner: root
        group: wheel
        mode: "0755"

    - name: Ensure jrun PF anchor file exists
      ansible.builtin.copy:
        dest: /etc/pf.anchors/jrun
        content: ""
        owner: root
        group: wheel
        mode: "0644"
        force: false

    - name: Install managed PF configuration
      ansible.builtin.template:
        src: pf.conf.j2
        dest: /etc/pf.conf
        owner: root
        group: wheel
        mode: "0644"

    - name: Ensure PF starts at boot
      ansible.builtin.command: sysrc pf_enable="YES"
      changed_when: false

    - name: Validate PF configuration
      ansible.builtin.command: pfctl -nf /etc/pf.conf
      changed_when: false

    - name: Load PF rules
      ansible.builtin.command: pfctl -f /etc/pf.conf

    - name: Check PF status
      ansible.builtin.command: pfctl -s info
      register: pf_status
      changed_when: false
      failed_when: false

    - name: Enable PF
      ansible.builtin.command: pfctl -e
      async: 1
      poll: 0

    - name: Wait for SSH to return
      wait_for_connection:
        delay: 5
        timeout: 60

    - name: Check whether Yggdrasil config already exists
      ansible.builtin.stat:
        path: "{{ ygg_conf_file }}"
      register: ygg_conf_stat

    - name: Generate initial Yggdrasil config if missing
      ansible.builtin.command: yggdrasil -genconf
      register: ygg_genconf
      changed_when: true
      when: not ygg_conf_stat.stat.exists

    - name: Write initial Yggdrasil config if missing
      ansible.builtin.copy:
        dest: "{{ ygg_conf_file }}"
        content: "{{ ygg_genconf.stdout }}"
        owner: root
        group: wheel
        mode: "0644"
      when: not ygg_conf_stat.stat.exists

    - name: Check whether Yggdrasil private key exists
      ansible.builtin.stat:
        path: "{{ ygg_key_file }}"
      register: ygg_key_stat

    - name: Export Yggdrasil private key if missing
      ansible.builtin.command: yggdrasil -useconffile {{ ygg_conf_file }} -exportkey
      register: ygg_exportkey
      changed_when: true
      when: not ygg_key_stat.stat.exists

    - name: Write Yggdrasil private key if missing
      ansible.builtin.copy:
        dest: "{{ ygg_key_file }}"
        content: "{{ ygg_exportkey.stdout }}"
        owner: root
        group: wheel
        mode: "0600"
      when: not ygg_key_stat.stat.exists

    - name: Install managed Yggdrasil host config
      ansible.builtin.template:
        src: yggdrasil-host.conf.j2
        dest: "{{ ygg_conf_file }}"
        owner: root
        group: wheel
        mode: "0644"
      notify: restart yggdrasil

    - name: Enable Yggdrasil at boot
      ansible.builtin.command: sysrc yggdrasil_enable="YES"
      changed_when: false

    - name: Ensure Yggdrasil is running
      ansible.builtin.service:
        name: yggdrasil
        state: started

    - name: Verify Yggdrasil listener is present
      ansible.builtin.command: sockstat -l
      register: ygg_sockstat
      changed_when: false
      failed_when: "'10.17.89.1:19001' not in (ygg_sockstat.stdout | default(''))"

    - name: Configure ntpd to step on any offset
      ansible.builtin.lineinfile:
        path: /etc/ntp.conf
        line: "tinker panic 0"
        regexp: '^tinker'
        insertbefore: BOF

    - name: Enable ntpd
      ansible.builtin.command: sysrc ntpd_enable="YES"
      changed_when: false

    - name: Start ntpd
      ansible.builtin.service:
        name: ntpd
        state: started

    - name: Bootstrap release (might take some time ☕️)
      ansible.builtin.command: bastille bootstrap {{ bsd_version }}-{{ bsd_release_tag }}

  handlers:
    - name: stop yggdrasil
      ansible.builtin.command: service yggdrasil stop
      register: ygg_stop
      failed_when: false
      changed_when: true
      listen: restart yggdrasil

    - name: start yggdrasil
      ansible.builtin.command: service yggdrasil start
      register: ygg_start
      failed_when: ygg_start.rc != 0
      listen: restart yggdrasil
