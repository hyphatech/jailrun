- name: Base VM Setup
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  tasks:
    - name: Install base packages
      ansible.builtin.package:
        name:
          - bastille
          - btop
          - fping
        state: present

    - name: Set VM-optimized kernel tunables
      ansible.builtin.lineinfile:
        path: /boot/loader.conf
        line: "{{ item.line }}"
        regexp: "{{ item.regexp }}"
      loop:
        - { regexp: '^kern\.hz=', line: 'kern.hz=100' }
        - { regexp: '^virtio_load=', line: 'virtio_load="YES"' }

    - name: Limit ZFS ARC
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        line: "vfs.zfs.arc_max=2147483648"
        regexp: '^vfs\.zfs\.arc_max='

    - name: Load PF module
      ansible.builtin.command: kldload pf
      register: kldload_pf
      failed_when: >
        kldload_pf.rc != 0 and 'already loaded' not in (kldload_pf.stderr | default(''))
      changed_when: kldload_pf.rc == 0

    - name: Setup Bastille
      ansible.builtin.command: bastille setup
      changed_when: false
      failed_when: false

    - name: Load PF rules
      ansible.builtin.command: pfctl -f /etc/pf.conf

    - name: Enable PF
      ansible.builtin.command: pfctl -e
      async: 1
      poll: 0

    - name: Wait for SSH to return
      wait_for_connection:
        delay: 5
        timeout: 60

    - name: Configure ntpd to step on any offset
      ansible.builtin.lineinfile:
        path: /etc/ntp.conf
        line: "tinker panic 0"
        regexp: '^tinker'
        insertbefore: BOF

    - name: Enable ntpd
      ansible.builtin.command: sysrc ntpd_enable="YES"
      changed_when: false

    - name: Start ntpd
      ansible.builtin.service:
        name: ntpd
        state: started

    - name: Bootstrap release (might take some time)
      ansible.builtin.command: bastille bootstrap {{ bsd_version }}-{{ bsd_release_tag }}
