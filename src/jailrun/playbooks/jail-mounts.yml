- name: Wire jail nullfs volumes
  hosts: localhost
  gather_facts: false
  become: true
  become_method: doas

  vars:
    bastille_jails_root: /usr/local/bastille/jails

  tasks:
    - name: Update jrun fstab entries in jails
      ansible.builtin.blockinfile:
        path: "{{ bastille_jails_root }}/{{ item.name }}/fstab"
        marker: "# {mark} JRUN MOUNTS"
        create: true
        block: |
          {% for m in jail_mounts | default([]) if m.jail == item.name %}
          {{ m.target_path }} {{ bastille_jails_root }}/{{ item.name }}/root{{ m.jail_path }} nullfs rw 0 0
          {% endfor %}
      loop: "{{ jails | default([]) }}"

    - name: Ensure jail nullfs mountpoints exist in jail root
      ansible.builtin.file:
        path: "{{ bastille_jails_root }}/{{ item.jail }}/root{{ item.jail_path }}"
        state: directory
        mode: "0755"
      loop: "{{ jail_mounts | default([]) }}"

    - name: Unmount stale jail nullfs mounts
      ansible.builtin.command: "bastille umount {{ item.jail }} {{ item.target_path }}"
      loop: "{{ stale_jail_mounts | default([]) }}"
      failed_when: false
      changed_when: true
